<svg xmlns="http://www.w3.org/2000/svg" width="700" height="200" viewBox="0 0 700 200">
  <defs>
    <style>
      .font-base { font-family: 'Segoe UI', system-ui, sans-serif; }
    </style>
    <linearGradient id="pgBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6f42c1"/>
      <stop offset="100%" stop-color="#bf91f9"/>
    </linearGradient>
    <!-- Animated stripe pattern for "in progress" feel -->
    <pattern id="stripes" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="20" fill="#6f42c1" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="700" height="200" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="350" y="26" text-anchor="middle" class="font-base" font-size="11" fill="#8b949e" letter-spacing="0.08em">TRAINING STATUS — QLoRA FINE-TUNING</text>

  <!-- Progress bar section -->
  <text x="24" y="50" class="font-base" font-size="12" fill="#8b949e">Overall Progress</text>
  <text x="676" y="50" text-anchor="end" class="font-base" font-size="12" font-weight="700" fill="#d29922">0%  ⏳</text>
  <!-- Bar track -->
  <rect x="24" y="56" width="652" height="16" rx="8" fill="#21262d"/>
  <!-- Striped empty bar to indicate "running but 0%" -->
  <rect x="24" y="56" width="652" height="16" rx="8" fill="url(#stripes)"/>
  <!-- Start cap glow -->
  <rect x="24" y="56" width="8" height="16" rx="4" fill="#6f42c1" opacity="0.8"/>

  <!-- Status rows — 3 rows, 30px apart -->
  <!-- Row 1: Data Prep DONE -->
  <rect x="24" y="84" width="652" height="28" rx="6" fill="#0f2b1a"/>
  <text x="48" y="103" class="font-base" font-size="13" fill="#3fb950">✓</text>
  <text x="70" y="103" class="font-base" font-size="13" font-weight="600" fill="#f0f6fc">Data Preparation</text>
  <rect x="480" y="88" width="180" height="20" rx="5" fill="#238636" opacity="0.25"/>
  <text x="570" y="102" text-anchor="middle" class="font-base" font-size="11" font-weight="600" fill="#3fb950">COMPLETE</text>

  <!-- Row 2: Smoke Test DONE -->
  <rect x="24" y="118" width="652" height="28" rx="6" fill="#0f2b1a"/>
  <text x="48" y="137" class="font-base" font-size="13" fill="#3fb950">✓</text>
  <text x="70" y="137" class="font-base" font-size="13" font-weight="600" fill="#f0f6fc">Smoke Test (2 steps)</text>
  <rect x="480" y="122" width="180" height="20" rx="5" fill="#238636" opacity="0.25"/>
  <text x="570" y="136" text-anchor="middle" class="font-base" font-size="11" font-weight="600" fill="#3fb950">COMPLETE</text>

  <!-- Row 3: Full Training RUNNING -->
  <rect x="24" y="152" width="652" height="28" rx="6" fill="#1c1408" stroke="#d29922" stroke-width="1"/>
  <text x="48" y="171" class="font-base" font-size="13" fill="#d29922">⏳</text>
  <text x="70" y="171" class="font-base" font-size="13" font-weight="600" fill="#f0f6fc">Full Training</text>
  <rect x="480" y="156" width="180" height="20" rx="5" fill="#d29922" opacity="0.2"/>
  <text x="570" y="170" text-anchor="middle" class="font-base" font-size="11" font-weight="600" fill="#d29922">RUNNING...</text>

  <!-- Bottom footnote -->
  <text x="350" y="196" text-anchor="middle" class="font-base" font-size="11" fill="#8b949e">4500 Alpaca samples  ·  3 epochs  ·  RTX A6000 48GB</text>
</svg>
